hydra:
  run:
    dir: python_course/gym-multigrid/
  sweep:
    dir: python_course/gym-multigrid/
    subdir: ''
  launcher:
    _target_: hydra_plugins.hydra_joblib_launcher.joblib_launcher.JoblibLauncher
    n_jobs: -3
    backend: null
    prefer: processes
    require: null
    verbose: 0
    timeout: null
    pre_dispatch: n_jobs
    batch_size: auto
    temp_folder: null
    max_nbytes: null
    mmap_mode: r
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - algorithm=matd3
    - train_epochs=50_000
    - env.reward_type=agent_above
    - experiments/team_size=ten
    - +experiments/obs=default,obs_range
  job:
    name: train_test_wildfire
    chdir: true
    override_dirname: +experiments/obs=default,obs_range,algorithm=matd3,env.reward_type=agent_above,experiments/team_size=ten,train_epochs=50_000
    id: ???
    num: ???
    config_name: default
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: D:\python_course\gym-multigrid
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: D:\python_course\gym-multigrid\configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      experiments/fire_spread: default
      experiments/team_size: ten
      experiments/env_size: default
      reward: default
      algorithm: matd3
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: joblib
      hydra/output: default
  verbose: false
wandb:
  enabled: false
  entity: vinokur-eg-
  project: Wildfire
  mode: online
use_cuda: false
device: cpu
sb3:
  _target_: algorithm.sb3.train
agilerl:
  _target_: algorithm.agilerl.train
common_reward: false
reward_scalarisation: sum
env:
  agents: 10
  agents_inference: 10
  flashpoints: 3
  world_size: 13
  alpha_transition: 0.3
  beta_transition: 0.8
  agent_beta_impact: 0.8
  obs_type: typed_one_hot
  reward_type: agent_above
  partial_obs: false
  cooperative_reward: true
run_id: ${name}_${env.agents}_${env.world_size}_${env.reward_type}_${now:%m_%d}_${now:%H_%M_%S}
training_type: agile_rl
from_scratch: true
evaluate: false
model_save_path: out/models/
log: out/logs/
train_epochs: 50000
memory_size: 10000
valid_interval: 5000
batch_size_run: 1
episodes: 25
name: matd3
algorithm:
  _target_: algorithm.agilerl.model_MATD3
init_hp:
  batch_size: 32
  O_U_noise: true
  expl_noise: 0.3
  mean_noise: 0.0
  theta: 0.15
  dt: 0.01
  lr_actor: 0.0005
  lr_critic: 0.0005
  gamma: 0.99
  tau: 0.01
  learn_step: 5
  policy_freq: 2
