wandb:
  enabled: true
  project: Wildfire
device: cpu
sb3:
  _target_: algorithm.sb3.train
env:
  agents: 5
  agents_inference: 5
  flashpoints: 3
  world_size: 13
  alpha_transition: 0.3
  beta_transition: 0.6
  agent_beta_impact: 0.3
  obs_type: typed_one_hot
  reward_type: fire_adjacent
  partial_obs: false
  cooperative_reward: true
run_id: ${name}_${env.agents}_${env.world_size}_${env.reward_type}_${now:%Y-%m-%d}/${now:%H-%M-%S}
training_type: agile_rl
from_scratch: true
job_type: train
model_save_path: out/models/
log: out/logs/
train_epochs: 10000
memory_size: 10000
valid_interval: 2000
episodes: 25
name: maddpg
algorithm:
  _target_: algorithm.agilerl.model_MADDPG
init_hp:
  O_U_noise: true
  expl_noise: 0.3
  mean_noise: 0.0
  theta: 0.15
  dt: 0.01
  lr_actor: 0.001
  lr_critic: 0.001
  gamma: 0.99
  tau: 0.01
  learn_step: 5
