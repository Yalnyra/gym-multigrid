# @package _global_
runner: 'parallel'
mac: open_train_mac
eval_mode: null # Evaluate model for test_nepisode episodes and quit (no training)
evaluate: False
local_results_path: ${model_save_path}/open_train # Relative path to save local results

open: True
n_uncontrolled: 4 # number of uncontrolled agents to sample and add to trained agent team

run_id: openq_${agents}_${n_uncontrolled}_obs_${agent_view_size}${fire_spread}
buffer_size: 5000
# --- agents to load ---
# define teams
run_id: $ensemble_${trained_agents}${uncntrl_agents.team0.agent_path}{uncntrl_agents.team1.agent_path}_${world_size}_obs_${agent_view_size}${fire_spread}



obs_agent_id: False
obs_last_action: False # POAM requires encoder to obs agents' last actions
obs_state: False # required for mappo critic
obs_individual_obs: False # used for cv_critic only
obs_team_composition: False 

uncntrl_agents: 
  vdn: 
    agent_loader: rnn_eval_agent_loader
    agent_path: tuned_vdn_obs_10
    load_step: last # Load model trained on this many timesteps (0 if choose max possible)
    n_agents_to_populate: 10 # must be less than n_agents
    test_mode: False
  qmix:
    agent_loader: rnn_eval_agent_loader
    agent_path: tuned_qmix_obs_10
    load_step: last
    n_agents_to_populate: 10 # must be less than n_agents
    test_mode: False
trainable_agents_mask_actor: True # applies to open train only
trainable_agents_mask_critic: False # applies to open train only

mask_type: "agent" # choices: [team, agent] 
# team: multiply default terminated and filled masks
# ind: compute individual mask from available actions

# --- Open train Parameters ---
trained_agents:
  iql:
    # agent_loader: poam_train_agent_loader
    agent_loader: rnn_train_agent_loader
    n_agents_to_populate: 10
    load_step: last
    # agent_path: ${checkpoint}
    agent_path: tuned_iql_obs_10
# trained_agents.agent_0.agent_path: 


# Fill it out with your base run path
base_uncntrl_path: D:/python_course/gym-multigrid/${model_save_path}

