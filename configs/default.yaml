defaults:
  - _self_
  - algorithm: poam
  - reward: fire_adjacent
  # - sweeper: wandb
  #   optional: True
  - experiments/open: 
  - experiments/env_size: default
  - experiments/obs: range_six
  - experiments/team_size: ten
  - experiments/fire_spread: default
  # - override hydra/job_logging: file
  # - override hydra/sweeper: ax
  # - override hydra/launcher: submitit_local
  - override hydra/launcher: joblib
  # - override hydra/sweeper: optuna


hydra:
  run:
    dir: 'D:/python_course/gym-multigrid/'
    # dir: 'D:/'
  sweep:
    dir: 'D:/python_course/gym-multigrid/'
    # dir: 'D:/'
    subdir: ''

  launcher:
    # timeout_min: 2880
    # timeout: 2880
    n_jobs: -2
    pre_dispatch: 2*n_jobs
    prefer: processes
    backend: multiprocessing
  sweeper: 
    max_batch_size: 1
  #   study_name: ${name}
  #   seed: ${seed}
  job:
    chdir: True

wandb: 
  enabled: False
  entity: vinokur-eg-
  project: Wildfire
  mode: online

use_cuda: False  
device: "cpu"

sb3:
  _target_: algorithm.sb3.train

agilerl:
  _target_: algorithm.agilerl.train

common_reward: False  # Run experiment with common reward setup
reward_scalarisation: "sum"  # How to aggregate rewards to single common reward (only used if common_reward is True
seed: 8001
eval_seed: 3456
env: wildfire
agents: 3
agents_inference: 10
flashpoints: 3
world_size: 13
alpha_transition: 0.3
beta_transition: 0.8
agent_beta_impact: 0.8
obs_type: typed_one_hot
reward_type: default
agent_view_size: 10
partial_obs: False
max_steps: 25

cooperative_reward: True

observations: 
  False: full
  True: partial_{$agent_view_size}

  


run_id: ${name}_${agents}_${world_size}_${reward_type}_obs_${agent_view_size}${fire_spread}
training_type: ???
from_scratch: True
evaluate: True
batch_size: 1 # Number of episodes to train on
batch_size_run: 1 # Number of episodes to train on
eval_mode: open # Evaluate model for test_nepisode episodes and quit (no training)
local_results_path: stag-hunt-8p8s8h/open_eval # Relative path to save local results

open: True 
n_uncontrolled: 2 # number of uncontrolled agents to sample and add to trained agent team

# --- agents to load ---
# define teams
uncntrl_agents: 
  iql: 
    agent_loader: rnn_eval_agent_loader
    agent_path: iql_ns_10_13_fire_adjacent_obs_10
    load_step: last # Load model trained on this many timesteps (0 if choose max possible)
    n_agents_to_populate: 10 # must be less than n_agents
    test_mode: True
  qmix:
    agent_loader: rnn_eval_agent_loader
    agent_path: qmix_ns_10_13_fire_adjacent_obs_10
    load_step: last
    n_agents_to_populate: 10 # must be less than n_agents
    test_mode: True
trainable_agents_mask_actor: True # applies to open train only
trainable_agents_mask_critic: False # applies to open train only
mac: open_eval_mac

trained_agents.agent_0.agent_path: ${checkpoint}

model_save_path: out/models/

# Fill it out with your base run path
base_uncntrl_path: foo/${model_save_path}


# checkpoint: 'pac_sarsa_dcg_ns_10_13_fire_adjacent_obs_10'
checkpoint: vdn_10_13_fire_adjacent_obs_10
use_rnn: True

log: out/logs/
train_epochs: 100_000
memory_size: 10_000  # Max memory buffer size
valid_interval: 10_000 # Valid frequency during train
episodes: 15