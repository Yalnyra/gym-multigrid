defaults:
  - _self_
  - algorithm: iql
  - reward: fire_adjacent
  # - sweeper: wandb
  #   optional: True
  # - experiments/open: poam_train
  - experiments/env_size: default
  - experiments/obs: range_ten
  - experiments/team_size: ten
  - experiments/fire_spread: default
  # - override hydra/job_logging: file
  # - override hydra/sweeper: ax
  # - override hydra/launcher: submitit_local
  - override hydra/launcher: joblib
  # - override hydra/sweeper: optuna


hydra:
  run:
    dir: 'D:/python_course/gym-multigrid/'
    # dir: 'D:/'
  sweep:
    dir: 'D:/python_course/gym-multigrid/'
    # dir: 'D:/'
    subdir: ''

  launcher:
    # timeout_min: 2880
    # timeout: 2880
    n_jobs: -2
    pre_dispatch: 2*n_jobs
    prefer: processes
    backend: multiprocessing
  sweeper: 
    max_batch_size: 1
  #   study_name: ${name}
  #   seed: ${seed}
  job:
    chdir: True

wandb: 
  enabled: False
  entity: vinokur-eg-
  project: Wildfire
  mode: online

use_cuda: False  
device: "cpu"

sb3:
  _target_: algorithm.sb3.train

agilerl:
  _target_: algorithm.agilerl.train

common_reward: False  # Run experiment with common reward setup
reward_scalarisation: "sum"  # How to aggregate rewards to single common reward (only used if common_reward is True
seed: 8001
eval_seed: 3456
env: wildfire
agents: 10
agents_inference: 10
flashpoints: 3
world_size: 13
alpha_transition: 0.3
beta_transition: 0.8
agent_beta_impact: 0.8
obs_type: typed_one_hot
reward_type: default
agent_view_size: 10
partial_obs: False
max_steps: 25

cooperative_reward: True

observations: 
  False: full
  True: partial_{$agent_view_size}

  


run_id: ${name}_${agents}_${world_size}_${reward_type}_obs_${agent_view_size}${fire_spread}
training_type: ???
from_scratch: True
evaluate: False
save_replay: True # Saving the replay of the model loaded from checkpoint_path
batch_size: 1 # Number of episodes to train on
batch_size_run: 1 # Number of episodes to train on
eval_mode: null
open: False
use_rnn: True

model_save_path: out/models/

# checkpoint: 'pac_sarsa_dcg_ns_10_13_fire_adjacent_obs_10'
# checkpoint: vdn_10_13_fire_adjacent_obs_10
checkpoint: 'tuned_ppo_obs_10'
log: out/logs/
train_epochs: 100_000
memory_size: 10_000  # Max memory buffer size
valid_interval: 10_000 # Valid frequency during train
episodes: 15