defaults:
  - _self_
  - algorithm: matd3
  - reward: default
  # - sweeper: wandb
  #   optional: True
  - experiments/env_size: default

  - experiments/team_size: default
  - experiments/fire_spread: default
  # - override hydra/job_logging: file
  # - override hydra/launcher: submitit_local
  - override hydra/launcher: joblib
  # - override hydra/sweeper: wandb


hydra:
  run:
    dir: '\!_SOFT/gym-multigrid/'
  sweep:
    dir: '\!_SOFT/gym-multigrid/'
    subdir: ''
  launcher:
    # timeout_min: 2880
    # timeout: 2880
    n_jobs: -3
    pre_dispatch: n_jobs

  job:
    chdir: True

wandb: 
  enabled: False
  project: Wildfire
device: "cpu"

sb3:
  _target_: algorithm.sb3.train

env:
  agents: 5
  agents_inference: 5
  flashpoints: 3
  world_size: 13
  alpha_transition: 0.3
  beta_transition: 0.8
  agent_beta_impact: 0.8
  obs_type: typed_one_hot
  reward_type: default
  partial_obs: False
  cooperative_reward: True

run_id: ${name}_${env.agents}_${env.world_size}_${env.reward_type}_${now:%m_%d}_${now:%H_%M_%S}
training_type: ???
from_scratch: True
job_type: train
model_save_path: out/models/
log: out/logs/
train_epochs: 100_000
memory_size: 10_000  # Max memory buffer size
valid_interval: 5000 # Valid frequency during train
episodes: 25