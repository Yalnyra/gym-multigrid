# @package _global_

# --- Defaults ---

# --- pymarl options ---
runner: "episode" # Runs 1 env for an episode
mac: "basic_mac" # Basic controller
# env: "sc2" # Environment name
common_reward: True  # Run experiment with common reward setup
reward_scalarisation: "mean"  # How to aggregate rewards to single common reward (only used if common_reward is True)
env_args: {} # Arguments for the environment
test_nepisode: ${episodes} # Number of episodes to test for
test_interval: ${valid_interval} # Test after {} timesteps have passed
test_greedy: True # Use greedy evaluation (if False, will set epsilon floor to 0
log_interval: ${valid_interval} # Log summary of stats after every {} timesteps
runner_log_interval: ${valid_interval} # Log runner stats (not test stats) every {} timesteps
learner_log_interval: ${valid_interval} # Log training stats every {} timesteps
t_max: ${train_epochs} # Stop running after this many timesteps
use_cuda: False # Use gpu by default unless it isn't available
buffer_cpu_only: True # If true we won't keep all of the replay buffer in vram

# --- Logging options ---
use_tensorboard: True # Log results to tensorboard
# use_wandb: ${w} # Log results to W&B
# wandb_team: null # W&B team name
# wandb_project: null # W&B project name
wandb_mode: "online" # W&B mode (online/offline)
wandb_save_model: True # Save models to W&B (only done if use_wandb is True and save_model is True)
save_model: True # Save the models to disk
save_model_interval: ${valid_interval} # Save models after this many timesteps
# checkpoint_path: "vdn_10_13_fire_adjacent_obs_10" # Load a checkpoint from this path
checkpoint_path: ${checkpoint}
evaluate: False # Evaluate model for test_nepisode episodes and quit (no training)
render: False # Render the environment when evaluating (only when evaluate == True)
load_step: 0 # Load model trained on this many timesteps (0 if choose max possible)
local_results_path: ${model_save_path} # Path for local results

# --- RL hyperparameters ---
gamma: 0.99
batch_size: 1 # Number of episodes to train on
batch_size_run: 1 # Number of episodes to train on
buffer_size: 32 # Size of the replay buffer
lr: 0.0005 # Learning rate for agents
optim_alpha: 0.99 # RMSProp alpha
optim_eps: 0.00001 # RMSProp epsilon
grad_norm_clip: 10 # Reduce magnitude of gradients above this L2 norm
add_value_last_step: True

# --- Agent parameters ---

n_agents: ${agents}
n_actions: 4
state_shape: ''
agent: "rnn" # Default rnn agent
hidden_dim: 128 # Size of hidden state for default rnn agent
obs_agent_id: False # Include the agent's one_hot id in the observation
obs_last_action: False # Include the agent's last action (one_hot) in the observation

# --- Experiment running params ---
repeat_id: 1
label: "default_label"
hypergroup: null