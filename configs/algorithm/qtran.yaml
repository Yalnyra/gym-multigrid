# @package _global_
defaults:
  - pymarl

name: "qtran"
common_reward: True  # Run experiment with common reward setup
reward_scalarisation: "mean"  # How to aggregate rewards to single common reward (only used if common_reward is True)


# --- QTRAN specific parameters ---
 # (float) the loss weight of Opt Loss
opt_loss: 0.01
# (float) the loss weight of Nopt Loss
nopt_min_loss: 0.0001

# use epsilon greedy action selector
action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000
evaluation_epsilon: 0.0

runner: "episode"

buffer_size: 5000

# update the target network every {} episodes
target_update_interval_or_tau: 200


obs_agent_id: False
obs_last_action: False
obs_individual_obs: False


# use the Q_Learner to train
standardise_returns: False
standardise_rewards: True

agent_output_type: "q"
learner: "qtran_learner"
double_q: True
mixer: "qtran_base"
qtran_arch: "qtran_paper"
network_size: "small"
use_rnn: True
mixing_embed_dim: 32
rnn_hidden_dim: 64
hypernet_layers: 2
hypernet_embed: 64