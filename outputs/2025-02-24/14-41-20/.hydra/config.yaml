wandb:
  project: Wildfire
run_id: matd3_5_7
algorithm: MATD3
training_type: agile_rl
INIT_HP:
  batch_size: 16
  O_U_noise: true
  expl_noise: 0.1
  mean_noise: 0.0
  theta: 0.15
  dt: 0.01
  lr_actor: 0.001
  lr_critic: 0.001
  gamma: 0.99
  tau: 0.01
  learn_step: 5
  policy_freq: 2
encoder_config:
  arch: mlp
  hidden_size:
  - 32
  - 32
from_scratch: true
job_type: test
train_epochs: 100000
valid_interval: 10000
memory_size: 10000
n_episodes: 10
n_env: 5
n_flashpoints: 3
world_size: 7
alpha_transition: 0.3
beta_transition: 0.8
agent_beta_impact: 0.8
obs_type: typed_one_hot
reward_type: fire_adjacent
tensorboard: out/logs/wildfire/
model_save_path: out/models/wildfire/${run_id}/
device: cpu
